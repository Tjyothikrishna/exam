name: CI-CD

on:
  push:
    branches: ["main", "work"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: exam_user
          POSTGRES_PASSWORD: exam_pass
          POSTGRES_DB: exam_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U exam_user -d exam_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret
      DATABASE_URL: postgresql+psycopg2://exam_user:exam_pass@localhost:5432/exam_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q || true
          python -m py_compile $(find . -name "*.py" -not -path "./.venv/*")

      - name: Build Docker image
        run: docker build -t exam-app:ci .
