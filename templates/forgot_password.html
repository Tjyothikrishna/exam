{% extends "base.html" %}
{% block title %}Forgot Password | Exam Portal{% endblock %}
{% block content %}
<div class="auth-shell">
  <section class="auth-card">
    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">We will email you an OTP to reset your password.</p>
    <form id="forgotPasswordForm" class="form-grid" action="{{ url_for('auth.forgot_password') }}" method="POST">
      <div class="field">
        <label for="email">Email Address</label>
        <input id="email" type="email" name="email" placeholder="you@example.com" required />
      </div>
      <button class="btn btn-primary btn-block" type="submit">Send OTP</button>
    </form>
  </section>
</div>
{% endblock %}
