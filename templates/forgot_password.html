{% extends "base.html" %}
{% block title %}Forgot Password | Exam Portal{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="card auth-card">
    <h1>Forgot password</h1>
    <p class="auth-subtitle">Enter your account email to receive a reset OTP.</p>
    <form class="form-grid" action="{{ url_for('auth.forgot_password') }}" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>
      </div>
      <button class="btn btn-primary" type="submit">Send OTP</button>
    </form>
  </div>
</section>
{% endblock %}
