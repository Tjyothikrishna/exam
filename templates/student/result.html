<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exam Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h4">Result: {{ exam.title }}</h1>
      <p><strong>Correct Answers:</strong> {{ correct }} / {{ total }}</p>
      <p><strong>Score:</strong> {{ score }}%</p>
      <p><strong>Result ID:</strong> {{ result.id }}</p>
      <a class="btn btn-primary" href="{{ url_for('student.dashboard') }}">Back to Dashboard</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('student.exams') }}">Take Another Exam</a>
    </div>
  </div>
</div>
</body>
</html>
