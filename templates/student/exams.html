<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Available Exams</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4">Available Exams</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('student.dashboard') }}">Back to Dashboard</a>
  </div>

  <div class="row g-3">
    {% for exam in exams %}
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5>{{ exam.title }}</h5>
          <p class="text-muted">{{ exam.description }}</p>
          <p><strong>Duration:</strong> {{ exam.duration }} minutes</p>
          <a class="btn btn-primary" href="{{ url_for('student.start_exam', exam_id=exam.id) }}">Start Exam</a>
        </div>
      </div>
    </div>
    {% else %}
    <div class="col-12"><div class="alert alert-info">No exams available right now.</div></div>
    {% endfor %}
  </div>
</div>
</body>
</html>
