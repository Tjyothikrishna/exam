<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ exam.title }} - Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="h4 mb-1">{{ exam.title }}</h1>
  <p class="text-muted">Duration: {{ exam.duration }} minutes</p>

  <form method="post" action="{{ url_for('student.submit_exam', exam_id=exam.id) }}">
    {% for q in questions %}
    <div class="card mb-3 shadow-sm">
      <div class="card-body">
        <h5>Q{{ loop.index }}. {{ q.question_text }}</h5>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="A" id="q{{ q.id }}a">
          <label class="form-check-label" for="q{{ q.id }}a">A. {{ q.option_a }}</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="B" id="q{{ q.id }}b">
          <label class="form-check-label" for="q{{ q.id }}b">B. {{ q.option_b }}</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="C" id="q{{ q.id }}c">
          <label class="form-check-label" for="q{{ q.id }}c">C. {{ q.option_c }}</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="D" id="q{{ q.id }}d">
          <label class="form-check-label" for="q{{ q.id }}d">D. {{ q.option_d }}</label>
        </div>
      </div>
    </div>
    {% endfor %}

    <button class="btn btn-success" type="submit">Submit Exam</button>
  </form>
</div>
</body>
</html>
