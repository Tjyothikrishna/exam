{% extends "base.html" %}
{% block title %}Verify OTP | Exam Portal{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="card auth-card">
    <h1>OTP verification</h1>
    <p class="auth-subtitle">Enter the OTP sent to your email address.</p>
    <form class="form-grid" action="{{ url_for('auth.verify_otp') }}" method="POST">
      <div class="form-group">
        <label for="otp">OTP</label>
        <input id="otp" type="text" name="otp" required>
      </div>
      <button class="btn btn-primary" type="submit">Verify OTP</button>
    </form>
  </div>
</section>
{% endblock %}
