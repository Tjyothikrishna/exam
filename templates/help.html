{% extends "base.html" %}
{% block title %}Help | Exam Portal{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/help.css') }}">
{% endblock %}
{% block content %}
<div class="container" style="max-width: 760px; margin: 0 auto;">
  <form action="" id="helpForm" method="POST">
    <h3>Help Request</h3>
    <div class="form-wrapper">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required class="form-control">
    </div>
    <div class="form-wrapper">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required class="form-control">
    </div>
    <div class="form-wrapper">
      <label for="phone">Phone Number:</label>
      <input type="text" id="phone" name="phone" required class="form-control">
    </div>
    <div class="form-wrapper">
      <label for="subject">Subject:</label>
      <input type="text" id="subject" name="subject" required class="form-control">
    </div>
    <div class="form-wrapper">
      <label for="content">Message:</label>
      <textarea id="content" name="content" required class="form-control" style="padding-top: 26px;"></textarea>
    </div>
    <button type="submit">Submit</button>
  </form>
</div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/help.js') }}"></script>
{% endblock %}
