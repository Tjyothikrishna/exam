<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <title>Student Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script defer src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    
</head>
<body>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <script>
            alert("{{ messages[0] }}");
        </script>
      {% endif %}
    {% endwith %}

     <!-- Mobile Menu (unchanged) -->
        <div class="mobile">
            <label class="mobile__label" for="checkbox">
              <div class="mobile__label__content">
                <span class="label__line"></span>
                <span class="label__line"></span>
              </div>
              <div class="mobile__label__content">
                <span class="label__line"></span>
                <span class="label__line"></span>
              </div>
              <div class="mobile__label__content">
                <span class="label__line"></span>
                <span class="label__line"></span>
              </div>
            </label>

            <input class="mobile__input" type="checkbox" id="checkbox" />
            <nav class="mobile__nav">
              <ul>
                <li class="nav__item"><a href="{{ url_for('student.home') }}">Home</a></li>
                <li class="nav__item"><a href="{{ url_for('pages.about') }}">About</a></li>
                <li class="nav__item"><a href="{{ url_for('pages.help') }}">Help</a></li>
              </ul>
            </nav>
        </div>

<div class="container">
    <div class="screen">

        <div class="screen__content">

            <h2 style="text-align:center; color:white;"> Login</h2>

            <form class="login" id="loginForm" 
                  action="{{ url_for('auth.login') }}" method="POST">

                <div class="login__field">
                    <i class="login__icon fas fa-user"></i>
                    <input type="email" 
                           name="email" 
                           class="login__input" 
                           placeholder="Enter your email"
                           required>
                </div>

                <div class="login__field">
                    <i class="login__icon fas fa-lock"></i>
                    <input type="password" 
                           name="password" 
                           class="login__input" 
                           placeholder="Enter your password"
                           required>
                </div>

                <button class="button login__submit" type="submit">
                    <span class="button__text">Log In Now</span>
                    <i class="button__icon fas fa-chevron-right"></i>
                </button>
            </form>

            <div class="auth-actions">
                <div class="auth-links">
                    <a href="{{ url_for('auth.signup') }}" class="alt-btn">
                        Create Account
                    </a>
                    <a href="{{ url_for('auth.forgot_password') }}" class="alt-link">
                        Forgot Password?
                    </a>
                </div>
            </div>

        </div>

        <div class="screen__background">
            <span class="screen__background__shape screen__background__shape4"></span>
            <span class="screen__background__shape screen__background__shape3"></span>
            <span class="screen__background__shape screen__background__shape2"></span>
            <span class="screen__background__shape screen__background__shape1"></span>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

</body>


</html>
