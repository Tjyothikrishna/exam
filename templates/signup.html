{% extends "base.html" %}
{% block title %}Sign Up | Exam Portal{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="card auth-card">
    <h1>Create account</h1>
    <p class="auth-subtitle">Use your details to register as a student.</p>
    <form class="form-grid" action="{{ url_for('auth.signup') }}" method="POST" enctype="multipart/form-data">
      <div class="form-grid two-col">
        <div class="form-group"><label for="first_name">First Name</label><input id="first_name" name="first_name" required></div>
        <div class="form-group"><label for="last_name">Last Name</label><input id="last_name" name="last_name" required></div>
      </div>
      <div class="form-grid two-col">
        <div class="form-group"><label for="email">Email</label><input id="email" type="email" name="email" required></div>
        <div class="form-group"><label for="mobile_number">Mobile Number</label><input id="mobile_number" name="mobile_number" required></div>
      </div>
      <div class="form-grid two-col">
        <div class="form-group"><label for="password">Password</label><input id="password" type="password" name="password" required></div>
        <div class="form-group"><label for="confirm_password">Confirm Password</label><input id="confirm_password" type="password" name="confirm_password" required></div>
      </div>
      <div class="form-grid two-col">
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group"><label for="profile_pic">Profile Picture (optional)</label><input id="profile_pic" type="file" name="profile_pic" accept="image/*"></div>
      </div>
      <button class="btn btn-primary" type="submit">Register</button>
    </form>
    <div class="inline-actions">
      <span>Already have an account?</span>
      <a href="{{ url_for('auth.login') }}">Login</a>
    </div>
  </div>
</section>
{% endblock %}
