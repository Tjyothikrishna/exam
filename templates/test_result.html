<!DOCTYPE html>
<html>
<head>
    <title>Test Result</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #43cea2, #185a9d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .card {
            background: white;
            color: black;
            padding: 40px;
            border-radius: 12px;
            width: 420px;
            text-align: center;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Test Completed 🎉</h2>
    <div class="score">{{ score }}/{{ total }}</div>
    <p>Percentage: <b>{{ percentage }}%</b></p>

    <a href="{{ url_for('home') }}" class="btn">Go to Home</a>
</div>

</body>
</html>
