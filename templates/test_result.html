{% extends "base.html" %}
{% block title %}Test Result | Exam Portal{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="card auth-card" style="text-align:center;">
    <h1>Test Completed</h1>
    <p class="auth-subtitle">Great effort! Here is your performance summary.</p>
    <div class="value" style="font-size:2.5rem;">{{ score }}/{{ total }}</div>
    <p><strong>Percentage:</strong> {{ percentage }}%</p>
    <a class="btn btn-primary" href="{{ url_for('student.home') }}">Return to Dashboard</a>
  </div>
</section>
{% endblock %}
